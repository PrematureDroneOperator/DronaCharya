camera:
  # ──────────────────────────────────────────────────────────────────────────
  # CAMERA SOURCE
  # ──────────────────────────────────────────────────────────────────────────
  # device_id is the fallback when stream_url is blank.
  # On Jetson, cv2.VideoCapture(0) often gives GREEN FRAMES because OpenCV
  # can't negotiate the camera's native pixel format (YUYV/MJPEG) over V4L2.
  # Use a GStreamer pipeline in stream_url to force proper format conversion.
  device_id: 0

  # ── Active source: GStreamer v4l2src pipeline ─────────────────────────────
  # This correctly decodes YUYV → BGR and eliminates green frames.
  # Change /dev/video0 → /dev/video1 if you want the second camera.
  stream_url: "v4l2src device=/dev/video0 ! video/x-raw,width=1280,height=720,framerate=30/1 ! videoconvert ! video/x-raw,format=BGR ! appsink drop=1"

  # Other options (uncomment to switch):
  #   Second USB cam:
  #     stream_url: "v4l2src device=/dev/video1 ! video/x-raw,width=1280,height=720,framerate=30/1 ! videoconvert ! video/x-raw,format=BGR ! appsink drop=1"
  #   Camera resolution auto-detect (safer if 1280x720 fails):
  #     stream_url: "v4l2src device=/dev/video0 ! videoconvert ! video/x-raw,format=BGR ! appsink drop=1"
  #   CSI camera (IMX219 / IMX477):
  #     stream_url: "nvarguscamerasrc sensor-id=0 ! video/x-raw(memory:NVMM),width=1280,height=720,framerate=30/1 ! nvvidconv ! video/x-raw,format=BGRx ! videoconvert ! video/x-raw,format=BGR ! appsink drop=1"
  #   RTSP stream:
  #     stream_url: "rtsp://<jetson-ip>:8554/drone"

  # ──────────────────────────────────────────────────────────────────────────
  # VIDEO WRITER SETTINGS
  # ──────────────────────────────────────────────────────────────────────────
  # MJPG + .avi  ← works on every Jetson L4T OpenCV build (no extra libs needed)
  # XVID + .avi  ← requires libxvidcore (often missing on Jetson)
  # mp4v + .mp4  ← silently writes empty files on Jetson L4T OpenCV
  fourcc: "MJPG"
  container: ".avi"

  # ──────────────────────────────────────────────────────────────────────────
  capture_count: 24
  capture_interval_sec: 0.25
  frame_width: 1280
  frame_height: 720

mapping:
  max_dimension: 1600
  meters_per_pixel: 0.05

vision:
  model_path: "models/target_yolo.pt"
  conf_threshold: 0.35
  target_class_name: "target"
  image_size: 640

mission:
  default_altitude_m: 15.0
  hover_time_sec: 5
  mavlink_connection: "udp:127.0.0.1:14550"
  mavlink_baudrate: 57600
  home_latitude: null
  home_longitude: null
  max_mission_duration_sec: 900

telemetry:
  command_host: "0.0.0.0"
  command_port: 14560
  gcs_host: "127.0.0.1"
  gcs_port: 14561

logging:
  level: "INFO"
  file_name: "dronacharya.log"
