camera:
  # ──────────────────────────────────────────────────────────────────────────
  # CAMERA SOURCE — choose ONE of the options below, leave the others blank.
  # ──────────────────────────────────────────────────────────────────────────
  #
  # OPTION A — USB / V4L2 webcam  ← /dev/video0 or /dev/video1 confirmed working
  #   device_id: 0  maps to /dev/video0
  #   device_id: 1  maps to /dev/video1
  device_id: 0

  # OPTION B — GStreamer pipeline (CSI cameras or V4L2 fallback)
  #   CSI (IMX219 etc.):
  #     stream_url: "nvarguscamerasrc sensor-id=0 ! video/x-raw(memory:NVMM),width=1280,height=720,framerate=30/1 ! nvvidconv ! video/x-raw,format=BGRx ! videoconvert ! video/x-raw,format=BGR ! appsink drop=1"
  #   USB via explicit GStreamer (use if device_id still fails):
  #     stream_url: "v4l2src device=/dev/video0 ! video/x-raw,width=1280,height=720,framerate=30/1 ! videoconvert ! video/x-raw,format=BGR ! appsink drop=1"
  #   RTSP:
  #     stream_url: "rtsp://<jetson-ip>:8554/drone"
  stream_url: ""   # ← non-empty overrides device_id

  # ──────────────────────────────────────────────────────────────────────────
  # VIDEO WRITER SETTINGS
  # ──────────────────────────────────────────────────────────────────────────
  # On Jetson Nano (L4T OpenCV), mp4v + .mp4 produces a silent empty file.
  # Use XVID + .avi — it is robustly supported on every OpenCV build.
  # Available options:
  #   fourcc: XVID  container: .avi   ← RECOMMENDED for Jetson (default)
  #   fourcc: mp4v  container: .mp4   ← works on desktop / full FFmpeg builds
  #   fourcc: avc1  container: .mp4   ← H.264, requires libx264 in OpenCV
  fourcc: "XVID"
  container: ".avi"

  # ──────────────────────────────────────────────────────────────────────────
  capture_count: 24
  capture_interval_sec: 0.25
  frame_width: 1280
  frame_height: 720

mapping:
  max_dimension: 1600
  meters_per_pixel: 0.05

vision:
  model_path: "models/target_yolo.pt"
  conf_threshold: 0.35
  target_class_name: "target"
  image_size: 640

mission:
  default_altitude_m: 15.0
  hover_time_sec: 5
  mavlink_connection: "udp:127.0.0.1:14550"
  mavlink_baudrate: 57600
  home_latitude: null
  home_longitude: null
  max_mission_duration_sec: 900

telemetry:
  command_host: "0.0.0.0"
  command_port: 14560
  gcs_host: "127.0.0.1"
  gcs_port: 14561

logging:
  level: "INFO"
  file_name: "dronacharya.log"
