camera:
  # ──────────────────────────────────────────────────────────────────────────
  # CAMERA SOURCE
  # ──────────────────────────────────────────────────────────────────────────
  # device_id is the fallback when stream_url is blank.
  # On Jetson, cv2.VideoCapture(0) often gives GREEN FRAMES because OpenCV
  # can't negotiate the camera's native pixel format (YUYV/MJPEG) over V4L2.
  # Use a GStreamer pipeline in stream_url to force proper format conversion.
  device_id: 1

  # ── Active source ─────────────────────────────────────────────────────────
  # Blank = use device_id above (recommended — recorder forces MJPG capture
  # automatically to avoid green frames, no GStreamer pipeline needed).
  stream_url: ""

  # GStreamer pipeline alternatives (only needed if device_id fails entirely):
  #   Auto-detect resolution (safe):
  #     stream_url: "v4l2src device=/dev/video0 ! videoconvert ! video/x-raw,format=BGR ! appsink drop=1"
  #   Fixed resolution (only if camera actually supports raw 1280x720 YUY2):
  #     stream_url: "v4l2src device=/dev/video0 ! video/x-raw,width=1280,height=720,framerate=30/1 ! videoconvert ! video/x-raw,format=BGR ! appsink drop=1"
  #   Second USB cam:
  #     Change device_id to 1, or swap /dev/video0 → /dev/video1 in the pipeline
  #   CSI camera (IMX219 / IMX477):
  #     stream_url: "nvarguscamerasrc sensor-id=0 ! video/x-raw(memory:NVMM),width=1280,height=720,framerate=30/1 ! nvvidconv ! video/x-raw,format=BGRx ! videoconvert ! video/x-raw,format=BGR ! appsink drop=1"
  #   RTSP stream:
  #     stream_url: "rtsp://<jetson-ip>:8554/drone"

  # ──────────────────────────────────────────────────────────────────────────
  # VIDEO WRITER SETTINGS
  # ──────────────────────────────────────────────────────────────────────────
  # MJPG + .avi  ← works on every Jetson L4T OpenCV build (no extra libs needed)
  # XVID + .avi  ← requires libxvidcore (often missing on Jetson)
  # mp4v + .mp4  ← silently writes empty files on Jetson L4T OpenCV
  fourcc: "MJPG"
  container: ".avi"

  # ──────────────────────────────────────────────────────────────────────────
  capture_count: 24
  capture_interval_sec: 0.25
  frame_width: 1280
  frame_height: 720

mapping:
  max_dimension: 1600
  meters_per_pixel: 0.05

vision:
  # Python 3.6 Jetson fallback:
  # if ultralytics is unavailable and this path is .pt,
  # detector auto-tries sibling .onnx (same basename).
  model_path: "models/target_yolo.pt"
  conf_threshold: 0.10
  target_class_name: "targetrotation"   # ← match your class name
  image_size: 640


survey:
  sessions_dir: "data/target_sessions"
  inference_every_n: 1
  detection_interval_sec: 0.5
  dedup_radius_m: 3.0
  graph_canvas_px: 1200
  graph_margin_px: 60
  min_gps_fix_type: 3
  center_region_ratio: 0.4   # fraction of frame (0‑1) around center that counts for geotagging

detector_service:
  host: "127.0.0.1"
  port: 17660
  request_timeout_sec: 1.5
  connect_timeout_sec: 2.0
  jpeg_quality: 80
  enabled: true

mission:
  default_altitude_m: 15.0
  hover_time_sec: 5
  
  # ──────────────────────────────────────────────────────────────────────────
  # MAVLINK CONNECTION
  # ──────────────────────────────────────────────────────────────────────────
  # Option 1: Direct Serial Connection (Jetson plugged into Pixhawk via GPIO)
  #   - mavlink_connection: "/dev/ttyTHS1"
  #   - mavlink_baudrate: 57600 (or 921600 if using Telem2 on Pixhawk)
  #   * Note: In this mode, telemetry radio CANNOT be used at the same time unless 
  #     it's plugged into a different Pixhawk port (e.g., Telem1 for radio, Telem2 for Jetson).
  # 
  # Option 2: MAVProxy UDP Connection (Recommended for sharing the connection)
  #   - mavlink_connection: "udp:127.0.0.1:14550"
  #   - Run this in the background on the Jetson: 
  #     mavproxy.py --master=/dev/ttyTHS1 --baudrate=57600 --out=udp:127.0.0.1:14550 --out=udp:<gcs_ip>:14550
  # ──────────────────────────────────────────────────────────────────────────
  mavlink_connection: "udp:127.0.0.1:14550"
  mavlink_baudrate: 57600
  
  home_latitude: null
  home_longitude: null
  max_mission_duration_sec: 900

telemetry:
  command_host: "0.0.0.0"
  command_port: 14560
  gcs_host: "127.0.0.1"
  gcs_port: 14561

logging:
  level: "INFO"
  file_name: "dronacharya.log"
